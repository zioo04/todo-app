<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>나의 투두리스트</title>
    <style>
        body { font-family: sans-serif; text-align: center; background-color: #f4f4f4; }
        .container { width: 300px; margin: 50px auto; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        h1 { color: #333; }
        input { padding: 10px; border: 1px solid #ddd; border-radius: 4px; width: 200px; }
        button { padding: 10px 15px; background-color: #5cb85c; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #4cae4c; }
        ul { list-style: none; padding: 0; margin-top: 20px; }
        li { background: #eee; border: 1px solid #ddd; border-radius: 4px; padding: 10px; margin-bottom: 5px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        li.checked { text-decoration: line-through; color: #888; background: #f9f9f9; }
        .delete-btn { color: red; cursor: pointer; font-weight: bold; margin-left: 10px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>To-Do List</h1>
        <input type="text" id="todo-input" placeholder="할 일을 입력하세요...">
        <button id="add-btn">추가</button>
        <ul id="todo-list"></ul>
    </div>
    <script src="script.js"></script>
</body>
</html>
